<!doctype html>
<html lang="en">
<head>
  <base href="/">

  <!-- ══ Core document meta (HTML5) ═══════════════════════════════════════ -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Bhagavad Karma Charitable Organisation">
  <meta name="theme-color" content="#4a6741">

  <!--
    NOTE: <meta http-equiv="X-UA-Compatible"> and <meta name="keywords"> were
    removed. X-UA-Compatible only targeted legacy Internet Explorer (retired
    2022) and the keywords tag has been ignored by all search engines for years.
    Title / description / OG / Twitter tags below are DEFAULTS for crawlers and
    no-JS clients; SeoService (src/app/services/seo.ts) overrides them per route.
  -->

  <!-- Page Title + Description (default: Home) -->
  <title>Bhagavad Karma | Spiritual Wellness &amp; Charitable Trust</title>
  <meta name="description" content="Bhagavad Karma is a charitable organisation promoting spiritual awareness, wellness, education and social welfare to uplift mankind across India.">
  <meta name="robots" content="index, follow, max-image-preview:large">

  <!-- Canonical (default home; SeoService updates it per route) -->
  <link rel="canonical" href="https://bhagavadkarma.org/">

  <!-- ══ Search engine + platform ownership verification ══════════════════ -->
  <!-- Replace the placeholder content with the real token from each console. -->
  <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_SEARCH_CONSOLE_TOKEN">
  <meta name="msvalidate.01" content="REPLACE_WITH_BING_WEBMASTER_TOKEN">
  <!-- Pinterest domain claim (Pinterest Business → Claim → add the tag) -->
  <meta name="p:domain_verify" content="REPLACE_WITH_PINTEREST_DOMAIN_VERIFY_CODE">

  <!-- ══ Open Graph (WhatsApp, Facebook, LinkedIn) ════════════════════════ -->
  <meta property="og:title" content="Bhagavad Karma | Spiritual Wellness &amp; Charitable Trust">
  <meta property="og:description" content="Bhagavad Karma is a charitable organisation promoting spiritual awareness, wellness, education and social welfare to uplift mankind across India.">
  <meta property="og:image" content="https://bhagavadkarma.org/assets/images/logo/bhagavad-karma-logo.svg">
  <meta property="og:url" content="https://bhagavadkarma.org/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Bhagavad Karma">
  <meta property="og:locale" content="en_IN">

  <!-- ══ Twitter / X Card ═════════════════════════════════════════════════ -->
  <!-- twitter:site / twitter:creator use the brand's X handle — replace the
       placeholder in SITE.twitterHandle (src/app/services/seo-data.ts) with the
       real, verified handle. SeoService keeps these in sync per route. -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@bhagavadkarma">
  <meta name="twitter:creator" content="@bhagavadkarma">
  <meta name="twitter:title" content="Bhagavad Karma | Spiritual Wellness &amp; Charitable Trust">
  <meta name="twitter:description" content="Bhagavad Karma is a charitable organisation promoting spiritual awareness, wellness, education and social welfare to uplift mankind across India.">
  <meta name="twitter:image" content="https://bhagavadkarma.org/assets/images/logo/bhagavad-karma-logo.svg">

  <!-- ══ rel="me" identity links (entity/authorship — reinforces sameAs) ═══
       Uncomment and set the real, brand-owned profile URLs once verified. These
       tell search/AI engines these accounts belong to this same entity. -->
  <!--
  <link rel="me" href="https://www.facebook.com/REPLACE_WITH_PAGE">
  <link rel="me" href="https://www.instagram.com/REPLACE_WITH_HANDLE">
  <link rel="me" href="https://www.youtube.com/@REPLACE_WITH_CHANNEL">
  <link rel="me" href="https://www.linkedin.com/company/REPLACE_WITH_COMPANY">
  <link rel="me" href="https://x.com/REPLACE_WITH_HANDLE">
  -->

  <!-- ══ Favicons / App icons ═════════════════════════════════════════════ -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo/bhagavad-karma-logo.svg">
  <link rel="apple-touch-icon" href="assets/images/logo/bhagavad-karma-logo.svg">
  <link rel="manifest" href="site.webmanifest">

  <!-- ══ Structured data — brand entity (Organization + WebSite) ══════════
       Defines Bhagavad Karma as a recognised entity for Google's Knowledge
       Graph and for AI engines (ChatGPT / Perplexity / Gemini) that cite
       well-defined brands. Per-page WebPage + BreadcrumbList schema is added
       dynamically by SeoService. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": ["Organization", "NGO"],
        "@id": "https://bhagavadkarma.org/#organization",
        "name": "Bhagavad Karma",
        "legalName": "Bhagavad Karma Charitable Organisation",
        "url": "https://bhagavadkarma.org/",
        "logo": "https://bhagavadkarma.org/assets/images/logo/bhagavad-karma-logo.svg",
        "description": "Bhagavad Karma is a charitable organisation promoting spiritual awareness, wellness, education and social welfare to uplift mankind across India.",
        "email": "help@bhagavadkarma.org",
        "telephone": "+91-89040-72335",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "No 6 CKMR Gardens, New Airport Road",
          "addressLocality": "Bangalore",
          "addressRegion": "Karnataka",
          "postalCode": "560077",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-89040-72335",
          "email": "help@bhagavadkarma.org",
          "contactType": "customer support",
          "areaServed": "IN",
          "availableLanguage": ["en", "kn", "ta", "hi"]
        },
        "sameAs": []
      },
      {
        "@type": "WebSite",
        "@id": "https://bhagavadkarma.org/#website",
        "url": "https://bhagavadkarma.org/",
        "name": "Bhagavad Karma",
        "inLanguage": "en-IN",
        "publisher": { "@id": "https://bhagavadkarma.org/#organization" }
      },
      {
        "@type": "LocalBusiness",
        "@id": "https://bhagavadkarma.org/#localbusiness",
        "name": "Bhagavad Karma",
        "image": "https://bhagavadkarma.org/assets/images/logo/bhagavad-karma-logo.svg",
        "url": "https://bhagavadkarma.org/",
        "telephone": "+91-89040-72335",
        "email": "help@bhagavadkarma.org",
        "priceRange": "₹₹",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "No 6 CKMR Gardens, New Airport Road",
          "addressLocality": "Bangalore",
          "addressRegion": "Karnataka",
          "postalCode": "560077",
          "addressCountry": "IN"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "13.0430",
          "longitude": "77.6205"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
            "opens": "09:00",
            "closes": "18:00"
          }
        ],
        "parentOrganization": { "@id": "https://bhagavadkarma.org/#organization" }
      }
    ]
  }
  </script>

  <!-- ══ Resource hints ═══════════════════════════════════════════════════
       preconnect opens the connection early; dns-prefetch is the wider-support
       fallback for browsers that cap preconnects. -->
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <!-- Speed up the Razorpay checkout handshake (loaded on demand at checkout) -->
  <link rel="preconnect" href="https://checkout.razorpay.com/">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com/">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com/">
  <link rel="dns-prefetch" href="https://checkout.razorpay.com/">

  <!-- Preload the brand logo (above the fold in the header on every route) so
       it paints without waiting for Angular to bootstrap — helps LCP. -->
  <link rel="preload" as="image" type="image/svg+xml"
        href="assets/images/logo/bhagavad-karma-logo.svg" fetchpriority="high">

  <link href="https://fonts.googleapis.com/css2?family=Marcellus&amp;family=Sora:wght@100..800&amp;display=swap" rel="stylesheet">

  <!-- ══ Theme stylesheets ════════════════════════════════════════════════
       The 8 theme CSS files (Bootstrap, SlickNav, Swiper, Font Awesome,
       Animate, Magnific Popup, Mouse Cursor, Custom) were moved OUT of these
       <link> tags and into angular.json → "styles" (in the SAME order, so the
       cascade is identical). Angular now bundles + minifies them into the
       hashed styles.css and injects it here at build time.

       Why: as raw assets/css link tags the Angular builder could not resolve
       them (base href="/" made it look under the drive root), producing
       "Unable to locate stylesheet" warnings on every build. Bundling them
       removes those warnings, consolidates 8 requests into 1 minified file,
       and does not change the rendered UI. -->

</head>
<body>
  <app-root>
    <div class="preloader">
      <div class="loading-container">
        <div class="loading"></div>
        <a class="navbar-brand" id="loading-icon">
          <img src="assets/images/logo/bhagavad-karma-logo.svg" alt="Bhagavad Karma" class="logo" style="filter:brightness(0) invert(1);    width: 49px;">
        </a>
      </div>
    </div>
  </app-root>

  <!--
    ════════════════════════════════════════════════════════════════════════
    REMOVED: legacy static-HTML scripts (cart drawer, product zoom, checkout,
    OTP, Razorpay handler, contact/appointment/member toast forms).

    These were carried over from the original static theme and are now fully
    re-implemented in Angular — see:
        • src/app/app.ts                     (cart drawer, checkout, OTP, toasts)
        • src/app/services/cart.ts           (cart state)
        • src/app/pages/**/*.ts              (page forms)
    Keeping them here duplicated global functions, bound to elements Angular
    controls, and shipped dead code. They have been deleted to keep the DOM
    single-owned by Angular. No UI or behaviour changed.
    ════════════════════════════════════════════════════════════════════════
  -->

  <!--
    REMOVED: inline scroll-to-top + toggleMenu() helpers. Both are already
    implemented reactively in src/app/app.ts (onScroll + toggleMenu()), so the
    inline versions were redundant duplicates.
  -->

  <!-- ══ Theme JavaScript libraries ═══════════════════════════════════════
       Load order matters: jQuery must precede its plugins, and GSAP must
       precede ScrollTrigger/SplitText. These drive the theme's animations and
       interactions, so they are kept intact and in order (removing any would
       change the existing UI). They correctly sit before </body>. -->
  <script src="assets/js/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap js file -->
  <script src="assets/js/bootstrap.min.js"></script>
  <!-- Validator js file -->
  <script src="assets/js/validator.min.js"></script>
  <!-- SlickNav js file -->
  <script src="assets/js/jquery.slicknav.js"></script>
  <!-- Swiper js file -->
  <script src="assets/js/swiper-bundle.min.js"></script>
  <!-- Counter js file -->
  <script src="assets/js/jquery.waypoints.min.js"></script>
  <script src="assets/js/jquery.counterup.min.js"></script>
  <!-- Magnific js file -->
  <script src="assets/js/jquery.magnific-popup.min.js"></script>
  <!-- SmoothScroll -->
  <script src="assets/js/SmoothScroll.js"></script>
  <!-- Parallax js -->
  <script src="assets/js/parallaxie.js"></script>
  <!-- MagicCursor js file -->
  <script src="assets/js/gsap.min.js"></script>
  <script src="assets/js/magiccursor.js"></script>
  <!-- Text Effect js file -->
  <script src="assets/js/SplitText.js"></script>
  <script src="assets/js/ScrollTrigger.min.js"></script>
  <!-- YTPlayer js File -->
  <script src="assets/js/jquery.mb.YTPlayer.min.js"></script>
  <!-- Wow js file -->
  <script src="assets/js/wow.min.js"></script>
  <!-- Main Custom js file -->
  <script src="assets/js/function.js"></script>

  <!-- Razorpay checkout — third-party, only needed when a user checks out,
       so it is deferred to keep it off the critical rendering path (better INP/LCP). -->
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>

</body>
</html>
