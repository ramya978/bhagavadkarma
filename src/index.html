    function parsePrice(val) {
      if (typeof val === 'number') return val;
      return parseInt(String(val).replace(/[^0-9]/g, '')) || 0;
    }

    /* ════════════════════════════════════════
       QUANTITY
    ════════════════════════════════════════ */
    function changeQty(delta) {
      var el = document.getElementById('pd-qty');
      el.value = Math.max(1, parseInt(el.value) + delta);
    }

    function getCart()   { return JSON.parse(localStorage.getItem('bkCart') || '[]'); }
    function saveCart(c) { localStorage.setItem('bkCart', JSON.stringify(c)); }

    function addThisToCart() {
      if (!currentProduct) return;
      var cart  = getCart();
      var qty   = parseInt(document.getElementById('pd-qty').value);
      var id    = currentProduct.id || currentProduct.name;
      var price = parsePrice(currentProduct.price);
      var idx   = cart.findIndex(function(x) { return (x.id || x.name) === id; });

      else { cart.push({ id: id, name: currentProduct.name, price: price, image: currentProduct.image, qty: qty }); }
      saveCart(cart);
      updateCartCount();
      showToast(currentProduct.name, qty);
    }

    function removeFromCart(id) {
      saveCart(getCart().filter(function(x) { return (x.id || x.name) !== id; }));

      var cart     = getCart();
      var total    = cart.reduce(function(s, x) { return s + x.price * x.qty; }, 0);
      var totalQty = cart.reduce(function(s, x) { return s + x.qty; }, 0);

      document.getElementById('drawer-count').textContent    = totalQty;
      document.getElementById('drawer-subtotal').textContent = total.toLocaleString('en-IN');
      document.getElementById('drawer-total').textContent    = total.toLocaleString('en-IN');

      var total = getCart().reduce(function(s, x) { return s + x.qty; }, 0);

    /* ════════════════════════════════════════
       FORM VALIDATION — Guest only
       (null-safe: checks element exists first)
    ════════════════════════════════════════ */
    function safeSetError(inputId, errId, msg) {
      var inp = document.getElementById(inputId);
      var err = document.getElementById(errId);
      if (!inp || !err) return;
      if (msg) { inp.classList.add('input-error'); err.textContent = msg; }
      else     { inp.classList.remove('input-error'); err.textContent = ''; }
    }

    function clearGuestErrors() {
      var guestInputs = ['co-fname', 'co-lname', 'co-email', 'co-phone', 'co-address'];
      var guestErrors = ['err-fname', 'err-email', 'err-phone', 'err-address'];
      guestInputs.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.classList.remove('input-error');
      });
      guestErrors.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = '';
      });
    }

    /* Live clear on input */
    ['co-fname','co-lname','co-email','co-phone','co-address'].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', function() {
        this.classList.remove('input-error');
        var suffix = id.replace('co-', '');
        var errEl  = document.getElementById('err-' + suffix);
        if (errEl) errEl.textContent = '';
      });
    });

    /* ════════════════════════════════════════
       RAZORPAY
    ════════════════════════════════════════ */
    function triggerRazorpay() {
      var amount = window._checkoutAmount || 0;
      if (amount < 1) return;

      var name, email, phone, address;

      if (isMemberMode) {
        /* Member mode — use verified phone */
        if (!otpVerified) {
          var s = document.getElementById('otpStatus');
          s.className = 'otp-status error';
          s.textContent = 'Please verify your phone number first.';
          return;
        }
        phone   = document.getElementById('mem-phone').value.trim();
        name    = 'Member';
        email   = '';
        address = '';
      } else {
        /* Guest mode — validate all fields */
        var fname   = document.getElementById('co-fname').value.trim();
        var lname   = document.getElementById('co-lname').value.trim();
        email       = document.getElementById('co-email').value.trim();
        phone       = document.getElementById('co-phone').value.trim();
        address     = document.getElementById('co-address').value.trim();
        name        = (fname + ' ' + lname).trim();

        clearGuestErrors();

        var hasError   = false;
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        var phoneRegex = /^[+]?[\d\s\-]{7,15}$/;

        if (!fname)                      { safeSetError('co-fname',   'err-fname',   'First name is required');      hasError = true; }
        if (!email)                      { safeSetError('co-email',   'err-email',   'Email address is required');   hasError = true; }
        else if (!emailRegex.test(email)){ safeSetError('co-email',   'err-email',   'Enter a valid email');         hasError = true; }
        if (!phone)                      { safeSetError('co-phone',   'err-phone',   'Phone number is required');    hasError = true; }
        else if (!phoneRegex.test(phone)){ safeSetError('co-phone',   'err-phone',   'Enter a valid phone number');  hasError = true; }
        if (!address)                    { safeSetError('co-address', 'err-address', 'Delivery address is required');hasError = true; }

        if (hasError) {
          var firstErr = document.querySelector('#guestSection .input-error');
          if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }
      }

      var description = (window._checkoutItems || []).map(function(i) { return i.name + '×' + i.qty; }).join(', ');

      var options = {
        key:         'rzp_test_SzcqBk5gDrHDv5',
        amount:      amount * 100,
        currency:    'INR',
        name:        'Swami Of The South',
        description: description,
        image:       'images/favicon.webp',
        prefill:     { name: name, email: email, contact: phone.replace(/\s+/g, '') },
        notes:       { address: address, items: description },
        theme:       { color: '#4a6741' },
        handler: function(response) {
          closeCheckout();
          clearGuestErrors();
          if (checkoutMode === 'cart') { saveCart([]); renderCartDrawer(); }
          document.getElementById('orderId').textContent = response.razorpay_payment_id;
          document.getElementById('successOverlay').classList.add('show');
        },
        modal: { ondismiss: function() {} }
      };

      var rzp = new Razorpay(options);
      rzp.on('payment.failed', function(r) {
        safeSetError('co-phone', 'err-phone', 'Payment failed: ' + r.error.description);
      });
      rzp.open();
    }

    function closeSuccess() {
      document.getElementById('successOverlay').classList.remove('show');
      window.location.href = 'store/skincare';
    }

    function copyOrderId() {
      var id = document.getElementById('orderId').textContent;
      if (!id || id === '—') return;
      navigator.clipboard.writeText(id).then(function() {
        showToast1();
      }).catch(function() {
        /* Fallback for older browsers */
        var ta = document.createElement('textarea');
        ta.value = id; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast1();
      });
    }

      status.className   = 'otp-status success';

function getCart()      { return JSON.parse(localStorage.getItem('bkCart') || '[]'); }
function saveCart(cart) { localStorage.setItem('bkCart', JSON.stringify(cart)); }

function removeFromCart(id) {
  saveCart(getCart().filter(x => x.id !== id));
  renderCartDrawer();
}

function updateQty(id, delta) {
  const cart = getCart();
  const idx  = cart.findIndex(x => x.id === id);
  if (idx === -1) return;
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  saveCart(cart);
  renderCartDrawer();
}

function renderCartDrawer() {
  const cart     = getCart();
  const totalQty = cart.reduce((s, x) => s + x.qty, 0);
  const totalAmt = cart.reduce((s, x) => s + x.price * x.qty, 0);

  const countEl = document.getElementById('cart-count');
  if (countEl) countEl.textContent = totalQty;

  const drawerCount = document.getElementById('drawer-count');
  const subtotalEl  = document.getElementById('drawer-subtotal');
  const totalEl     = document.getElementById('drawer-total');
  if (drawerCount) drawerCount.textContent = totalQty;
  if (subtotalEl)  subtotalEl.textContent  = totalAmt.toLocaleString('en-IN');
  if (totalEl)     totalEl.textContent     = totalAmt.toLocaleString('en-IN');

  const itemsEl = document.getElementById('drawer-items');
  if (!itemsEl) return;

  if (cart.length === 0) {
    itemsEl.innerHTML = '<p class="cart-empty-msg" style="color:#aaa;text-align:center;padding:40px 0;font-size:14px;">Your cart is empty.</p>';
    return;
  }

  itemsEl.innerHTML = cart.map(item => `
    <div class="cart-line" style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #f5f2ed;">
      <img src="${item.image}" alt="${item.name}"
           style="width:60px;height:60px;object-fit:contain;border-radius:10px;background:#f7f5f0;padding:4px;flex-shrink:0;">
   <div class="cart-line-info">
            <h5>${item.name}</h5>
            <p>Qty: ${item.qty}</p>
            <button class="cart-line-remove" onclick="removeFromCart(${item.id})">
              <i class="fa-solid fa-xmark"></i> Remove
            </button>
          </div>
          <span class="cart-line-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</span>
    </div>
  `).join('');
}
function openCartDrawer() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCartDrawer() {
  document.getElementById('cartDrawer').classList.remove('open');
